app = "devproof-app"
primary_region = "iad"

[build]

[env]
  PORT = "8000"
  DB_PATH = "/data/devproof.db"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "devproof_data"
  destination = "/data"
